server {
    listen 80;
    server_name localhost;
    
    # 1. Arahkan root ke folder public milik Laravel
    root /var/www/ksmif.org/public;
    
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # 2. Redirect semua URL ke index.php (Wajib buat routing Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 3. Lempar script PHP ke container PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # 'php:9000' -> 'php' adalah nama service di docker-compose.yml
        fastcgi_pass php:9000; 
        
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2)$ {
        # Sets the 'Expires' and 'Cache-Control' headers
        expires 1d;
        
        # 'public' allows intermediate caches (like CDNs) to store the file
        add_header Cache-Control "public, no-transform";
        
        # Optional: Disable logging for these assets to keep logs clean
        access_log off;
        log_not_found off;
    }
}