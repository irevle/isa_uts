services:
    web-server:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./:/var/www/semogaberkah.org
            - ./dockerconfig/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    database:
        image: mariadb:latest
        ports:
            - "3306:3306"
        restart: always
        environment:
            MARIADB_DATABASE: ${DB_DATABASE}
            MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
        volumes:
            - ./dockerconfig/mariadb:/var/lib/mysql

    php:
        image: php:8.4-fpm
        build: ./dockerconfig
        volumes:
            - ./:/var/www/semogaberkah.org
        working_dir: /var/www/semogaberkah.org

    composer:
        image: composer:2.8
        volumes:
            - ./:/app
        command: composer install
        stdin_open: true
        tty: true

    node:
        image: node:alpine
        volumes:
            - ./:/app
        working_dir: /app
        command: sh -c "npm install && npm run dev"
        stdin_open: true
        tty: true
        ports:
            - "3000:3000"
            - "5173:5173"
